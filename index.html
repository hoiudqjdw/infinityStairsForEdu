<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>무한의 계단 - 숲속 모험</title>
<style>
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: #0a0b12;
  overflow: hidden;
  font-family: "Courier New", ui-monospace, monospace;
  touch-action: none;
}

#stage {
  position: relative;
  width: 100%;
  height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  background: #0d0e15;
  overflow: hidden;
  image-rendering: pixelated;
}

canvas#game {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
  image-rendering: pixelated;
}

/* ---------- HUD ---------- */
#hud {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  padding: 14px 14px 0;
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 5;
  pointer-events: none;
}

#gaugeWrap {
  flex: 1;
  height: 20px;
  background: #11131c;
  border: 3px solid #05060a;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: inset 0 2px 0 rgba(0,0,0,.6);
}

#gaugeFill {
  height: 100%;
  width: 0%;
  background: linear-gradient(180deg, #ff8a4c, #e8482a);
  transition: width 0.12s linear;
}

#floorLabel {
  background: #ffe9a8;
  border: 3px solid #7a5a1e;
  border-radius: 8px;
  padding: 4px 10px;
  font-weight: bold;
  color: #4a3210;
  font-size: 20px;
  min-width: 64px;
  text-align: center;
}

#floorLabel small {
  font-size: 12px;
  margin-left: 2px;
}

#btnMute {
  pointer-events: auto;
  width: 38px;
  height: 38px;
  flex-shrink: 0;
  border: 3px solid #05060a;
  border-radius: 8px;
  background: #2a2d3d;
  color: #fff8e8;
  font-size: 16px;
  cursor: pointer;
}

#btnMute:active {
  background: #181a24;
}

/* ---------- Controls ---------- */
#controls {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 22%;
  min-height: 110px;
  display: flex;
  z-index: 5;
}

.ctrlBtn {
  flex: 1;
  border: none;
  font-size: 42px;
  font-weight: bold;
  color: #fff8e8;
  background: #232636;
  border-top: 4px solid #383d54;
  cursor: pointer;
  transition: background 0.05s;
}

.ctrlBtn:active,
.ctrlBtn.pressed {
  background: #141622;
}

#btnLeft {
  border-right: 2px solid #0a0b12;
}

#btnRight {
  border-left: 2px solid #0a0b12;
}

/* ---------- Overlays ---------- */
.overlay {
  position: absolute;
  inset: 0;
  z-index: 10;
  background: rgba(6, 7, 12, 0.9);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: #fff8e8;
  padding: 24px;
  gap: 10px;
}

.overlay.hidden {
  display: none;
}

.overlay h1 {
  font-size: 28px;
  margin: 0 0 6px;
  color: #ffd25a;
  text-shadow: 2px 2px 0 #7a4a10;
}

.overlay p {
  margin: 0;
  line-height: 1.5;
  font-size: 15px;
}

.overlay p.small {
  font-size: 12px;
  opacity: 0.7;
}

.resultFloor {
  font-size: 22px !important;
}

.resultFloor span {
  font-size: 40px;
  color: #ffd25a;
  font-weight: bold;
}

.bigBtn {
  margin-top: 16px;
  padding: 14px 36px;
  font-size: 18px;
  font-weight: bold;
  color: #4a3210;
  background: #ffd25a;
  border: 4px solid #b8871f;
  border-radius: 12px;
  cursor: pointer;
  transition: background 0.1s;
}

.bigBtn:active {
  transform: translateY(2px);
}

.bigBtn:hover {
  background: #ffe566;
}

/* ---------- Mode Selection ---------- */
#modeSelection {
  position: absolute;
  inset: 0;
  z-index: 10;
  background: rgba(6, 7, 12, 0.95);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: #fff8e8;
  padding: 24px;
  gap: 20px;
}

#modeSelection.hidden {
  display: none;
}

#modeSelection h1 {
  font-size: 32px;
  margin: 0 0 10px;
  color: #ffd25a;
  text-shadow: 2px 2px 0 #7a4a10;
}

#modeSelection p {
  margin: 0 0 30px;
  font-size: 16px;
  opacity: 0.8;
}

#modeButtons {
  display: flex;
  gap: 20px;
  justify-content: center;
  width: 100%;
}

.modeBtn {
  flex: 1;
  max-width: 150px;
  padding: 40px 20px;
  font-size: 24px;
  font-weight: bold;
  border: 4px solid #b8871f;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.1s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

#btnDay {
  background: #ffd25a;
  color: #4a3210;
}

#btnDay:hover {
  background: #ffe566;
}

#btnDay:active {
  transform: translateY(2px);
}

#btnNight {
  background: #3a3f58;
  color: #fff8e8;
  border-color: #505570;
}

#btnNight:hover {
  background: #45495f;
}

#btnNight:active {
  transform: translateY(2px);
}

.modeBtn span {
  font-size: 40px;
}
</style>
</head>
<body>
  <div id="stage">
    <canvas id="game"></canvas>

    <div id="hud">
      <div id="gaugeWrap">
        <div id="gaugeFill"></div>
      </div>
      <div id="floorLabel"><span id="floorNum">0</span><small>층</small></div>
      <button id="btnMute" aria-label="음소거 전환">🔊</button>
    </div>

    <div id="controls">
      <button id="btnLeft" class="ctrlBtn" aria-label="왼쪽">◀</button>
      <button id="btnRight" class="ctrlBtn" aria-label="오른쪽">▶</button>
    </div>

    <div id="modeSelection" class="overlay">
      <h1>무한의 계단</h1>
      <p>시간대를 선택하세요</p>
      <div id="modeButtons">
        <button id="btnDay" class="modeBtn">
          <span>☀️</span>
          <div>낮</div>
        </button>
        <button id="btnNight" class="modeBtn">
          <span>🌙</span>
          <div>밤</div>
        </button>
      </div>
    </div>

    <div id="startScreen" class="overlay hidden">
      <h1>무한의 계단</h1>
      <p>계단이 꺾이는 방향에 맞춰<br>왼쪽 / 오른쪽 버튼을 누르세요!</p>
      <p class="small">방향키(← →)로도 조작할 수 있어요</p>
      <button id="btnStart" class="bigBtn">시작하기</button>
    </div>

    <div id="gameOverScreen" class="overlay hidden">
      <h1 id="gameOverTitle">시간 초과!</h1>
      <p class="resultFloor"><span id="finalFloor">0</span>층 도달</p>
      <button id="btnRetry" class="bigBtn">다시하기</button>
    </div>
  </div>

  <script>
  (() => {
    "use strict";

    // ---------- Canvas setup ----------
    const stage = document.getElementById("stage");
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    let dpr = Math.max(1, window.devicePixelRatio || 1);
    let viewW = 0, viewH = 0;

    function resize() {
      const rect = stage.getBoundingClientRect();
      viewW = rect.width;
      viewH = rect.height;
      dpr = Math.max(1, window.devicePixelRatio || 1);
      canvas.width = Math.round(viewW * dpr);
      canvas.height = Math.round(viewH * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    window.addEventListener("resize", resize);
    resize();

    // ---------- Constants ----------
    const STEP_DX = 46;
    const STEP_DY = 44;
    const ANIM_MS = 140;
    const STUMBLE_MS = 220;

    const TIME_MAX = 100;
    const BASE_DRAIN_RATE = 9;
    const TIME_BONUS = 7;

    // ---------- Game state ----------
    let state = "modeSelect";
    let gameMode = null;
    let steps = [];
    let currentIndex = 0;
    let curDir = "R";
    let runRemaining = 0;

    let charPos = { x: 0, y: 0 };
    let animFrom = null, animTo = null, animStart = 0, animKind = null;
    let isAnimating = false;

    let timeLeft = TIME_MAX;
    let floor = 0;
    let elapsedPlaying = 0;
    let lastTime = 0;

    let camera = { x: 0, y: 0 };
    let shake = 0;

    const keys = {};

    // ---------- Audio ----------
    const bgm = new Audio("audio/bgm.mp3");
    bgm.loop = true;
    bgm.volume = 0.45;

    const sfxSources = {
      step: "audio/step.wav",
      miss: "audio/miss.wav",
      click: "audio/click.wav",
      gameover: "audio/gameover.mp3",
    };
    const sfx = {};
    for (const key in sfxSources) sfx[key] = new Audio(sfxSources[key]);

    let muted = false;

    function playSfx(name) {
      if (muted) return;
      const src = sfx[name];
      const node = src.cloneNode();
      node.volume = name === "gameover" ? 0.8 : 0.6;
      node.play().catch(() => {});
    }

    function setMuted(next) {
      muted = next;
      bgm.muted = muted;
      btnMute.textContent = muted ? "🔇" : "🔊";
    }

    const btnMute = document.getElementById("btnMute");
    btnMute.addEventListener("click", () => setMuted(!muted));

    // ---------- Step generation ----------
    function makeStartStep() {
      return { x: 0, y: 0, dir: null };
    }

    function genNextStep(prev) {
      // runRemaining이 0이면 새로운 방향과 길이를 결정
      if (runRemaining <= 0) {
        // 현재 방향을 무작위로 선택 (L 또는 R)
        curDir = Math.random() < 0.5 ? "L" : "R";
        
        // 매우 짧은 구간 (1-4칸) - 자주 꺾임
        const minRun = 1;
        const maxRun = Math.min(4, 2 + Math.floor(floor / 100));
        runRemaining = minRun + Math.floor(Math.random() * (maxRun - minRun + 1));
      }
      
      runRemaining--;
      const dx = curDir === "R" ? STEP_DX : -STEP_DX;
      return { x: prev.x + dx, y: prev.y - STEP_DY, dir: curDir };
    }

    function ensureBuffer() {
      while (steps.length < currentIndex + 24) {
        steps.push(genNextStep(steps[steps.length - 1]));
      }
    }

    function resetGame() {
      steps = [makeStartStep()];
      currentIndex = 0;
      curDir = Math.random() < 0.5 ? "L" : "R";
      runRemaining = 0;
      ensureBuffer();

      charPos = { x: steps[0].x, y: steps[0].y };
      animFrom = animTo = null;
      isAnimating = false;

      timeLeft = TIME_MAX;
      floor = 0;
      elapsedPlaying = 0;

      camera.x = charPos.x;
      camera.y = charPos.y;
      shake = 0;

      updateFloorLabel();
      updateGauge();
    }

    // ---------- Input ----------
    function tryStep(pressedDir) {
      if (state !== "playing") return;
      if (isAnimating) return;

      const target = steps[currentIndex + 1];
      if (target.dir === pressedDir) {
        animFrom = { x: charPos.x, y: charPos.y };
        animTo = { x: target.x, y: target.y };
        animStart = performance.now();
        animKind = "move";
        isAnimating = true;

        currentIndex++;
        floor++;
        timeLeft = Math.min(TIME_MAX, timeLeft + TIME_BONUS);
        ensureBuffer();
        updateFloorLabel();
        playSfx("step");
      } else {
        animFrom = { x: charPos.x, y: charPos.y };
        animTo = { x: charPos.x + (pressedDir === "R" ? 10 : -10), y: charPos.y };
        animStart = performance.now();
        animKind = "stumble";
        isAnimating = true;

        shake = 1;
        playSfx("miss");
        triggerGameOver("miss");
      }
    }

    function pressButton(dir, btnEl) {
      if (btnEl) {
        btnEl.classList.add("pressed");
        setTimeout(() => btnEl.classList.remove("pressed"), 100);
      }
      if (state === "start") {
        startGame();
        return;
      }
      if (state === "gameover") return;
      tryStep(dir);
    }

    const btnLeft = document.getElementById("btnLeft");
    const btnRight = document.getElementById("btnRight");

    btnLeft.addEventListener("pointerdown", (e) => { e.preventDefault(); pressButton("L", btnLeft); });
    btnRight.addEventListener("pointerdown", (e) => { e.preventDefault(); pressButton("R", btnRight); });

    window.addEventListener("keydown", (e) => {
      if (e.repeat) return;
      if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") pressButton("L", btnLeft);
      else if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") pressButton("R", btnRight);
    });

    document.getElementById("btnStart").addEventListener("click", () => { playSfx("click"); startGame(); });
    document.getElementById("btnRetry").addEventListener("click", () => { playSfx("click"); backToModeSelect(); });

    const btnDay = document.getElementById("btnDay");
    const btnNight = document.getElementById("btnNight");

    btnDay.addEventListener("click", () => { playSfx("click"); selectMode("day"); });
    btnNight.addEventListener("click", () => { playSfx("click"); selectMode("night"); });

    function selectMode(mode) {
      gameMode = mode;
      state = "start";
      document.getElementById("modeSelection").classList.add("hidden");
      document.getElementById("startScreen").classList.remove("hidden");
    }

    function backToModeSelect() {
      gameMode = null;
      state = "modeSelect";
      document.getElementById("startScreen").classList.add("hidden");
      document.getElementById("gameOverScreen").classList.add("hidden");
      document.getElementById("modeSelection").classList.remove("hidden");
    }

    function startGame() {
      resetGame();
      state = "playing";
      document.getElementById("startScreen").classList.add("hidden");
      document.getElementById("gameOverScreen").classList.add("hidden");
      bgm.currentTime = 0;
      if (!muted) bgm.play().catch(() => {});
    }

    function triggerGameOver(reason) {
      if (state !== "playing") return;
      state = "gameover";
      document.getElementById("finalFloor").textContent = floor;
      document.getElementById("gameOverTitle").textContent =
        reason === "miss" ? "헛디뎠다!" : "시간 초과!";
      document.getElementById("gameOverScreen").classList.remove("hidden");
      bgm.pause();
      playSfx("gameover");
    }

    // ---------- HUD ----------
    const gaugeFillEl = document.getElementById("gaugeFill");
    const floorNumEl = document.getElementById("floorNum");

    function updateGauge() {
      const pct = (timeLeft / TIME_MAX) * 100;
      gaugeFillEl.style.width = pct + "%";
      gaugeFillEl.style.background = pct <= 25
        ? "linear-gradient(180deg, #ff6b5c, #c72a2a)"
        : pct <= 55
          ? "linear-gradient(180deg, #ffcf5c, #d68a1f)"
          : "linear-gradient(180deg, #7ee88a, #2fa84a)";
    }
    function updateFloorLabel() {
      floorNumEl.textContent = floor;
    }

    // ---------- Update ----------
    function update(dt) {
      if (state !== "playing") return;

      elapsedPlaying += dt;
      
      // 8층마다 빨라지고, 400층에서 최대 속도에 도달
      const additionalDrain = Math.min(50, floor / 8);
      const rate = BASE_DRAIN_RATE + additionalDrain;
      
      timeLeft = Math.max(0, timeLeft - rate * dt);
      updateGauge();

      if (timeLeft <= 0) {
        triggerGameOver("time");
        return;
      }

      if (isAnimating) {
        const t = Math.min(1, (performance.now() - animStart) / (animKind === "move" ? ANIM_MS : STUMBLE_MS));
        const ease = 1 - Math.pow(1 - t, 2);
        charPos.x = animFrom.x + (animTo.x - animFrom.x) * ease;
        charPos.y = animFrom.y + (animTo.y - animFrom.y) * ease;
        if (t >= 1) {
          isAnimating = false;
          if (animKind === "stumble") {
            charPos.x = animFrom.x;
            charPos.y = animFrom.y;
          } else {
            charPos.x = animTo.x;
            charPos.y = animTo.y;
          }
        }
      }

      const followSpeed = 10;
      camera.x += (charPos.x - camera.x) * Math.min(1, followSpeed * dt);
      camera.y += (charPos.y - camera.y) * Math.min(1, followSpeed * dt);

      if (shake > 0) shake = Math.max(0, shake - dt * 4);
    }

    // ---------- Rendering ----------
    const COLORS_DAY = {
      sky1: "#87ceeb",
      sky2: "#e0f6ff",
      brick: "#8b7355",
      brickDark: "#6b5344",
      brickLine: "#5a4433",
      stepEdge: "#4a3420",
      skin: "#f0c090",
      hair: "#2b2118",
      shirt: "#2f5fa8",
      pants: "#28324a",
      tie: "#c23a3a",
    };

    const COLORS_NIGHT = {
      sky1: "#0b0d1a",
      sky2: "#1c1e36",
      brick: "#4a536b",
      brickDark: "#2e3447",
      brickLine: "#1e2230",
      stepEdge: "#151821",
      skin: "#f0c090",
      hair: "#2b2118",
      shirt: "#2f5fa8",
      pants: "#28324a",
      tie: "#c23a3a",
    };

    function getColors() {
      return gameMode === "day" ? COLORS_DAY : COLORS_NIGHT;
    }

    function worldToScreen(wx, wy) {
      return {
        x: viewW / 2 + (wx - camera.x),
        y: viewH * 0.62 + (wy - camera.y),
      };
    }

    function drawBackground() {
      const colors = getColors();
      const g = ctx.createLinearGradient(0, 0, 0, viewH);
      g.addColorStop(0, colors.sky1);
      g.addColorStop(1, colors.sky2);
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, viewW, viewH);

      if (gameMode === "night") {
        ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
        for (let s = 0; s < 20; s++) {
          let sx = (s * 53 + 10) % viewW;
          let sy = (s * 89 + 20) % (viewH * 0.4);
          ctx.fillRect(sx, sy, 2, 2);
        }

        ctx.fillStyle = "rgba(255, 240, 180, 0.6)";
        ctx.beginPath();
        ctx.arc(viewW * 0.8, viewH * 0.15, 25, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillStyle = "rgba(255, 255, 255, 0.6)";
        for (let c = 0; c < 5; c++) {
          let cx = (c * 100) % viewW;
          let cy = 30 + (c * 25) % 80;
          ctx.fillRect(cx, cy, 40, 15);
          ctx.beginPath();
          ctx.arc(cx + 10, cy, 12, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(cx + 35, cy, 12, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      const parallax1 = camera.y * 0.25;
      if (gameMode === "night") {
        drawTreeGroup(-200, viewH - 150 + (parallax1 % 300), 
                      ["#0a1a10", "#081410", "#06120c"], 0.3, 50, 12);
        drawTreeGroup(100, viewH - 140 + (parallax1 % 300),
                      ["#0a1a10", "#081410", "#06120c"], 0.3, 45, 10);
        drawTreeGroup(350, viewH - 160 + (parallax1 % 300),
                      ["#0a1a10", "#081410", "#06120c"], 0.3, 55, 14);
      } else {
        drawTreeGroup(-200, viewH - 150 + (parallax1 % 300), 
                      ["#2d5a1f", "#1f4a15", "#15380d"], 0.3, 50, 12);
        drawTreeGroup(100, viewH - 140 + (parallax1 % 300),
                      ["#2d5a1f", "#1f4a15", "#15380d"], 0.3, 45, 10);
        drawTreeGroup(350, viewH - 160 + (parallax1 % 300),
                      ["#2d5a1f", "#1f4a15", "#15380d"], 0.3, 55, 14);
      }

      const parallax2 = camera.y * 0.4;
      if (gameMode === "night") {
        drawTreeGroup(-150, viewH - 100 + (parallax2 % 300),
                      ["#1a3a1a", "#0f2a0f", "#0a2008"], 0.5, 60, 16);
        drawTreeGroup(80, viewH - 90 + (parallax2 % 300),
                      ["#1a3a1a", "#0f2a0f", "#0a2008"], 0.5, 55, 14);
        drawTreeGroup(320, viewH - 110 + (parallax2 % 300),
                      ["#1a3a1a", "#0f2a0f", "#0a2008"], 0.5, 65, 18);
      } else {
        drawTreeGroup(-150, viewH - 100 + (parallax2 % 300),
                      ["#4a8a3a", "#3a7a2a", "#2a6a1a"], 0.5, 60, 16);
        drawTreeGroup(80, viewH - 90 + (parallax2 % 300),
                      ["#4a8a3a", "#3a7a2a", "#2a6a1a"], 0.5, 55, 14);
        drawTreeGroup(320, viewH - 110 + (parallax2 % 300),
                      ["#4a8a3a", "#3a7a2a", "#2a6a1a"], 0.5, 65, 18);
      }

      const parallax3 = camera.y * 0.55;
      if (gameMode === "night") {
        drawTreeGroup(-100, viewH - 30 + (parallax3 % 300),
                      ["#2a4a2a", "#1a3a1a", "#0f2f0f"], 0.7, 70, 20);
        drawTreeGroup(150, viewH - 20 + (parallax3 % 300),
                      ["#2a4a2a", "#1a3a1a", "#0f2f0f"], 0.7, 75, 22);
        drawTreeGroup(400, viewH - 40 + (parallax3 % 300),
                      ["#2a4a2a", "#1a3a1a", "#0f2f0f"], 0.7, 80, 24);
      } else {
        drawTreeGroup(-100, viewH - 30 + (parallax3 % 300),
                      ["#5aaa4a", "#4a9a3a", "#3a8a2a"], 0.7, 70, 20);
        drawTreeGroup(150, viewH - 20 + (parallax3 % 300),
                      ["#5aaa4a", "#4a9a3a", "#3a8a2a"], 0.7, 75, 22);
        drawTreeGroup(400, viewH - 40 + (parallax3 % 300),
                      ["#5aaa4a", "#4a9a3a", "#3a8a2a"], 0.7, 80, 24);
      }

      if (gameMode === "night") {
        ctx.fillStyle = "rgba(255, 240, 100, 0.6)";
        for (let f = 0; f < 8; f++) {
          let fx = (f * 61 + 40) % viewW;
          let fy = (f * 107 + 100 + parallax2) % (viewH * 0.8);
          ctx.fillRect(fx, fy, 1.5, 1.5);
        }
      }
    }

    function drawTreeGroup(baseX, baseY, colors, alpha, trunkHeight, canopySize) {
      ctx.globalAlpha = alpha;

      ctx.fillStyle = colors[2];
      const trunkWidth = Math.max(4, Math.floor(canopySize * 0.25));
      ctx.fillRect(baseX - trunkWidth / 2, baseY - trunkHeight, trunkWidth, trunkHeight);

      ctx.fillStyle = colors[0];
      ctx.beginPath();
      ctx.arc(baseX, baseY - trunkHeight - canopySize * 0.3, canopySize * 0.6, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = colors[1];
      ctx.beginPath();
      ctx.arc(baseX - canopySize * 0.25, baseY - trunkHeight, canopySize * 0.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(baseX + canopySize * 0.25, baseY - trunkHeight, canopySize * 0.5, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = colors[0];
      ctx.beginPath();
      ctx.arc(baseX, baseY - trunkHeight + canopySize * 0.2, canopySize * 0.55, 0, Math.PI * 2);
      ctx.fill();

      ctx.globalAlpha = 1;
    }

    function drawStep(step) {
      const colors = getColors();
      const p = worldToScreen(step.x, step.y);
      const w = STEP_DX + 24;
      const h = 16;
      const x = p.x - w / 2;
      const y = p.y;

      ctx.fillStyle = "rgba(0,0,0,0.35)";
      ctx.fillRect(x + 6, y + h, w - 12, Math.max(0, viewH - (y + h)));

      ctx.fillStyle = colors.brick;
      ctx.fillRect(x, y, w, h);
      ctx.fillStyle = colors.brickDark;
      ctx.fillRect(x, y + h - 5, w, 5);

      ctx.strokeStyle = colors.brickLine;
      ctx.lineWidth = 1;
      const cell = 12;
      for (let cx = 0; cx < w; cx += cell) {
        ctx.beginPath();
        ctx.moveTo(x + cx, y);
        ctx.lineTo(x + cx, y + h - 5);
        ctx.stroke();
      }
      ctx.strokeStyle = colors.stepEdge;
      ctx.lineWidth = 2;
      ctx.strokeRect(x + 1, y + 1, w - 2, h - 2);
    }

    function drawCharacter() {
      const colors = getColors();
      const p = worldToScreen(charPos.x, charPos.y);
      const facing = curDir === "R" ? 1 : -1;
      const bob = isAnimating && animKind === "move" ? -6 : 0;
      const wobble = isAnimating && animKind === "stumble" ? Math.sin(performance.now() / 20) * 3 : 0;

      ctx.save();
      ctx.translate(p.x + wobble, p.y - 30 + bob);
      ctx.scale(facing, 1);

      ctx.fillStyle = colors.pants;
      ctx.fillRect(-8, 14, 6, 12);
      ctx.fillRect(2, 14, 6, 12);

      ctx.fillStyle = colors.shirt;
      ctx.fillRect(-9, -4, 18, 20);

      ctx.fillStyle = colors.tie;
      ctx.fillRect(-2, -3, 4, 12);

      ctx.fillStyle = colors.shirt;
      ctx.fillRect(-13, -2, 5, 12);
      ctx.fillRect(8, -2, 5, 12);

      ctx.fillStyle = colors.skin;
      ctx.fillRect(-8, -20, 16, 16);

      ctx.fillStyle = colors.hair;
      ctx.fillRect(-8, -22, 16, 5);

      ctx.fillStyle = "#1a1a1a";
      ctx.fillRect(4, -13, 2, 2);

      ctx.restore();
    }

    function render() {
      ctx.save();
      if (shake > 0) {
        const sx = (Math.random() - 0.5) * 6 * shake;
        const sy = (Math.random() - 0.5) * 6 * shake;
        ctx.translate(sx, sy);
      }

      drawBackground();

      const lo = Math.max(0, currentIndex - 2);
      const hi = Math.min(steps.length - 1, currentIndex + 14);
      for (let i = lo; i <= hi; i++) drawStep(steps[i]);

      drawCharacter();

      ctx.restore();
    }

    // ---------- Main loop ----------
    function loop(now) {
      if (!lastTime) lastTime = now;
      const dt = Math.min(0.05, (now - lastTime) / 1000);
      lastTime = now;

      update(dt);
      render();

      requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
  })();
  </script>
</body>
