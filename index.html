<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>무한의 계단 - 클론 (밤 모드)</title>
<style>
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: #0a0b12; /* 전체 배경을 조금 더 어둡게 변경 */
  overflow: hidden;
  font-family: "Courier New", ui-monospace, monospace;
  touch-action: none;
}

#stage {
  position: relative;
  width: 100%;
  height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  background: #0d0e15;
  overflow: hidden;
  image-rendering: pixelated;
}

canvas#game {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
  image-rendering: pixelated;
}

/* ---------- HUD ---------- */
#hud {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  padding: 14px 14px 0;
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 5;
  pointer-events: none;
}

#gaugeWrap {
  flex: 1;
  height: 20px;
  background: #11131c;
  border: 3px solid #05060a;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: inset 0 2px 0 rgba(0,0,0,.6);
}

#gaugeFill {
  height: 100%;
  width: 0%;
  background: linear-gradient(180deg, #ff8a4c, #e8482a);
  transition: width 0.12s linear;
}

#floorLabel {
  background: #ffe9a8;
  border: 3px solid #7a5a1e;
  border-radius: 8px;
  padding: 4px 10px;
  font-weight: bold;
  color: #4a3210;
  font-size: 20px;
  min-width: 64px;
  text-align: center;
}

#floorLabel small {
  font-size: 12px;
  margin-left: 2px;
}

#btnMute {
  pointer-events: auto;
  width: 38px;
  height: 38px;
  flex-shrink: 0;
  border: 3px solid #05060a;
  border-radius: 8px;
  background: #2a2d3d;
  color: #fff8e8;
  font-size: 16px;
  cursor: pointer;
}

#btnMute:active {
  background: #181a24;
}

/* ---------- Controls ---------- */
#controls {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 22%;
  min-height: 110px;
  display: flex;
  z-index: 5;
}

.ctrlBtn {
  flex: 1;
  border: none;
  font-size: 42px;
  font-weight: bold;
  color: #fff8e8;
  background: #232636;
  border-top: 4px solid #383d54;
  cursor: pointer;
  transition: background 0.05s;
}

.ctrlBtn:active,
.ctrlBtn.pressed {
  background: #141622;
}

#btnLeft {
  border-right: 2px solid #0a0b12;
}

#btnRight {
  border-left: 2px solid #0a0b12;
}

/* ---------- Overlays ---------- */
.overlay {
  position: absolute;
  inset: 0;
  z-index: 10;
  background: rgba(6, 7, 12, 0.9);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: #fff8e8;
  padding: 24px;
  gap: 10px;
}

.overlay.hidden {
  display: none;
}

.overlay h1 {
  font-size: 28px;
  margin: 0 0 6px;
  color: #ffd25a;
  text-shadow: 2px 2px 0 #7a4a10;
}

.overlay p {
  margin: 0;
  line-height: 1.5;
  font-size: 15px;
}

.overlay p.small {
  font-size: 12px;
  opacity: 0.7;
}

.resultFloor {
  font-size: 22px !important;
}

.resultFloor span {
  font-size: 40px;
  color: #ffd25a;
  font-weight: bold;
}

.bigBtn {
  margin-top: 16px;
  padding: 14px 36px;
  font-size: 18px;
  font-weight: bold;
  color: #4a3210;
  background: #ffd25a;
  border: 4px solid #b8871f;
  border-radius: 12px;
  cursor: pointer;
}

.bigBtn:active {
  transform: translateY(2px);
}
</style>
</head>
<body>
  <div id="stage">
    <canvas id="game"></canvas>

    <div id="hud">
      <div id="gaugeWrap">
        <div id="gaugeFill"></div>
      </div>
      <div id="floorLabel"><span id="floorNum">0</span><small>층</small></div>
      <button id="btnMute" aria-label="음소거 전환">🔊</button>
    </div>

    <div id="controls">
      <button id="btnLeft" class="ctrlBtn" aria-label="왼쪽">◀</button>
      <button id="btnRight" class="ctrlBtn" aria-label="오른쪽">▶</button>
    </div>

    <div id="startScreen" class="overlay">
      <h1>무한의 계단</h1>
      <p>계단이 꺾이는 방향에 맞춰<br>왼쪽 / 오른쪽 버튼을 누르세요!</p>
      <p class="small">방향키(← →)로도 조작할 수 있어요</p>
      <button id="btnStart" class="bigBtn">시작하기</button>
    </div>

    <div id="gameOverScreen" class="overlay hidden">
      <h1 id="gameOverTitle">시간 초과!</h1>
      <p class="resultFloor"><span id="finalFloor">0</span>층 도달</p>
      <button id="btnRetry" class="bigBtn">다시하기</button>
    </div>
  </div>

  <script>
  (() => {
    "use strict";

    // ---------- Canvas setup ----------
    const stage = document.getElementById("stage");
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    let dpr = Math.max(1, window.devicePixelRatio || 1);
    let viewW = 0, viewH = 0;

    function resize() {
      const rect = stage.getBoundingClientRect();
      viewW = rect.width;
      viewH = rect.height;
      dpr = Math.max(1, window.devicePixelRatio || 1);
      canvas.width = Math.round(viewW * dpr);
      canvas.height = Math.round(viewH * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    window.addEventListener("resize", resize);
    resize();

    // ---------- Constants ----------
    const STEP_DX = 46;   // horizontal distance per step (world units)
    const STEP_DY = 44;   // vertical rise per step
    const ANIM_MS = 140;  // step animation duration
    const STUMBLE_MS = 220;

    const TIME_MAX = 100;        // timer bar units, full at game start
    const BASE_DRAIN_RATE = 9;   // units/sec passively drained
    const TIME_BONUS = 7;        // units restored per correct step

    // ---------- Game state ----------
    let state = "start"; // start | playing | gameover
    let steps = [];       // {x, y, dir}  dir: 'L' | 'R' — direction needed to step onto this from previous
    let currentIndex = 0;
    let curDir = "R";
    let runRemaining = 3;

    let charPos = { x: 0, y: 0 };   // rendered (animated) position, world coords
    let animFrom = null, animTo = null, animStart = 0, animKind = null; // 'move' | 'stumble'
    let isAnimating = false;

    let timeLeft = TIME_MAX;
    let floor = 0;
    let elapsedPlaying = 0;
    let lastTime = 0;

    let camera = { x: 0, y: 0 };
    let shake = 0;

    const keys = {};

    // ---------- Audio ----------
    const bgm = new Audio("audio/bgm.mp3");
    bgm.loop = true;
    bgm.volume = 0.45;

    const sfxSources = {
      step: "audio/step.wav",
      miss: "audio/miss.wav",
      click: "audio/click.wav",
      gameover: "audio/gameover.mp3",
    };
    const sfx = {};
    for (const key in sfxSources) sfx[key] = new Audio(sfxSources[key]);

    let muted = false;

    function playSfx(name) {
      if (muted) return;
      const src = sfx[name];
      const node = src.cloneNode();
      node.volume = name === "gameover" ? 0.8 : 0.6;
      node.play().catch(() => {});
    }

    function setMuted(next) {
      muted = next;
      bgm.muted = muted;
      btnMute.textContent = muted ? "🔇" : "🔊";
    }

    const btnMute = document.getElementById("btnMute");
    btnMute.addEventListener("click", () => setMuted(!muted));

    // ---------- Step generation ----------
    function makeStartStep() {
      return { x: 0, y: 0, dir: null };
    }

    function genNextStep(prev) {
      if (runRemaining <= 0) {
        curDir = curDir === "R" ? "L" : "R";
        const maxRun = Math.max(2, 5 - Math.floor(floor / 40));
        runRemaining = 2 + Math.floor(Math.random() * (maxRun - 1));
      }
      runRemaining--;
      const dx = curDir === "R" ? STEP_DX : -STEP_DX;
      return { x: prev.x + dx, y: prev.y - STEP_DY, dir: curDir };
    }

    function ensureBuffer() {
      while (steps.length < currentIndex + 24) {
        steps.push(genNextStep(steps[steps.length - 1]));
      }
    }

    function resetGame() {
      steps = [makeStartStep()];
      currentIndex = 0;
      curDir = Math.random() < 0.5 ? "L" : "R";
      runRemaining = 3;
      ensureBuffer();

      charPos = { x: steps[0].x, y: steps[0].y };
      animFrom = animTo = null;
      isAnimating = false;

      timeLeft = TIME_MAX;
      floor = 0;
      elapsedPlaying = 0;

      camera.x = charPos.x;
      camera.y = charPos.y;
      shake = 0;

      updateFloorLabel();
      updateGauge();
    }

    // ---------- Input ----------
    function tryStep(pressedDir) {
      if (state !== "playing") return;
      if (isAnimating) return;

      const target = steps[currentIndex + 1];
      if (target.dir === pressedDir) {
        // success
        animFrom = { x: charPos.x, y: charPos.y };
        animTo = { x: target.x, y: target.y };
        animStart = performance.now();
        animKind = "move";
        isAnimating = true;

        currentIndex++;
        floor++;
        timeLeft = Math.min(TIME_MAX, timeLeft + TIME_BONUS);
        ensureBuffer();
        updateFloorLabel();
        playSfx("step");
      } else {
        // miss — a single wrong step ends the run immediately
        animFrom = { x: charPos.x, y: charPos.y };
        animTo = { x: charPos.x + (pressedDir === "R" ? 10 : -10), y: charPos.y };
        animStart = performance.now();
        animKind = "stumble";
        isAnimating = true;

        shake = 1;
        playSfx("miss");
        triggerGameOver("miss");
      }
    }

    function pressButton(dir, btnEl) {
      if (btnEl) {
        btnEl.classList.add("pressed");
        setTimeout(() => btnEl.classList.remove("pressed"), 100);
      }
      if (state === "start") {
        startGame();
        return;
      }
      if (state === "gameover") return;
      tryStep(dir);
    }

    const btnLeft = document.getElementById("btnLeft");
    const btnRight = document.getElementById("btnRight");

    btnLeft.addEventListener("pointerdown", (e) => { e.preventDefault(); pressButton("L", btnLeft); });
    btnRight.addEventListener("pointerdown", (e) => { e.preventDefault(); pressButton("R", btnRight); });

    window.addEventListener("keydown", (e) => {
      if (e.repeat) return;
      if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") pressButton("L", btnLeft);
      else if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") pressButton("R", btnRight);
    });

    document.getElementById("btnStart").addEventListener("click", () => { playSfx("click"); startGame(); });
    document.getElementById("btnRetry").addEventListener("click", () => { playSfx("click"); startGame(); });

    function startGame() {
      resetGame();
      state = "playing";
      document.getElementById("startScreen").classList.add("hidden");
      document.getElementById("gameOverScreen").classList.add("hidden");
      bgm.currentTime = 0;
      if (!muted) bgm.play().catch(() => {});
    }

    function triggerGameOver(reason) {
      if (state !== "playing") return;
      state = "gameover";
      document.getElementById("finalFloor").textContent = floor;
      document.getElementById("gameOverTitle").textContent =
        reason === "miss" ? "헛디뎠다!" : "시간 초과!";
      document.getElementById("gameOverScreen").classList.remove("hidden");
      bgm.pause();
      playSfx("gameover");
    }

    // ---------- HUD ----------
    const gaugeFillEl = document.getElementById("gaugeFill");
    const floorNumEl = document.getElementById("floorNum");

    function updateGauge() {
      const pct = (timeLeft / TIME_MAX) * 100;
      gaugeFillEl.style.width = pct + "%";
      gaugeFillEl.style.background = pct <= 25
        ? "linear-gradient(180deg, #ff6b5c, #c72a2a)"
        : pct <= 55
          ? "linear-gradient(180deg, #ffcf5c, #d68a1f)"
          : "linear-gradient(180deg, #7ee88a, #2fa84a)";
    }
    function updateFloorLabel() {
      floorNumEl.textContent = floor;
    }

    // ---------- Update ----------
    function update(dt) {
      if (state !== "playing") return;

      elapsedPlaying += dt;
      const rate = BASE_DRAIN_RATE + Math.min(6, floor / 30);
      timeLeft = Math.max(0, timeLeft - rate * dt);
      updateGauge();

      if (timeLeft <= 0) {
        triggerGameOver("time");
        return;
      }

      // resolve animation
      if (isAnimating) {
        const t = Math.min(1, (performance.now() - animStart) / (animKind === "move" ? ANIM_MS : STUMBLE_MS));
        const ease = 1 - Math.pow(1 - t, 2);
        charPos.x = animFrom.x + (animTo.x - animFrom.x) * ease;
        charPos.y = animFrom.y + (animTo.y - animFrom.y) * ease;
        if (t >= 1) {
          isAnimating = false;
          if (animKind === "stumble") {
            charPos.x = animFrom.x;
            charPos.y = animFrom.y;
          } else {
            charPos.x = animTo.x;
            charPos.y = animTo.y;
          }
        }
      }

      // camera follows character
      const followSpeed = 10;
      camera.x += (charPos.x - camera.x) * Math.min(1, followSpeed * dt);
      camera.y += (charPos.y - camera.y) * Math.min(1, followSpeed * dt);

      if (shake > 0) shake = Math.max(0, shake - dt * 4);
    }

    // ---------- Rendering ----------
    // 밤 테마에 맞춰 배경 및 건물 색상 코드 전면 수정
    const COLORS = {
      sky1: "#0b0d1a",        // 깊은 밤하늘 상단
      sky2: "#1c1e36",        // 지평선 부근 은은한 밤하늘 하단
      buildingA: "#181a2e",   // 원경 건물 (어두운 네이비)
      buildingB: "#121424",   // 근경 건물 (더 어두운 실루엣)
      brick: "#4a536b",       // 계단 블록 (달빛을 받는 느낌의 차분한 톤)
      brickDark: "#2e3447",   // 계단 블록 어두운 면
      brickLine: "#1e2230",   // 계단 라인
      stepEdge: "#151821",    // 계단 테두리
      skin: "#f0c090",
      hair: "#2b2118",
      shirt: "#2f5fa8",
      pants: "#28324a",
      tie: "#c23a3a",
    };

    function worldToScreen(wx, wy) {
      return {
        x: viewW / 2 + (wx - camera.x),
        y: viewH * 0.62 + (wy - camera.y),
      };
    }

    function drawBackground() {
      const g = ctx.createLinearGradient(0, 0, 0, viewH);
      g.addColorStop(0, COLORS.sky1);
      g.addColorStop(1, COLORS.sky2);
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, viewW, viewH);

      // 밤하늘에 작은 별들 그리기 (도트 감성 살리기)
      ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
      // 고정된 위치 느낌을 주기 위해 카메라 좌표를 활용한 간단한 별 무리 연산
      for (let s = 0; s < 15; s++) {
        let sx = (s * 45) % viewW;
        let sy = (s * 73) % (viewH * 0.5);
        ctx.fillRect(sx, sy, 2, 2);
      }

      // 실루엣 건물들에 불 켜진 창문 효과 추가 (야경 느낌 연출)
      const parallax = camera.y * 0.35;
      ctx.fillStyle = COLORS.buildingA;
      for (let i = -2; i < 8; i++) {
        const bw = 46;
        const bx = (i * 70) - ((camera.x * 0.25 + 20) % 70);
        const bh = 90 + ((i * 53) % 120);
        const by = viewH - bh + (parallax % 200) - 100;
        ctx.fillRect(bx, by, bw, bh + 400);

        // 건물 A 창문들
        ctx.fillStyle = "rgba(255, 220, 100, 0.15)"; // 희미한 불빛
        if (i % 2 === 0) {
          ctx.fillRect(bx + 10, by + 20, 6, 8);
          ctx.fillRect(bx + 28, by + 50, 6, 8);
        }
        ctx.fillStyle = COLORS.buildingA; // 빌딩 색상 원복
      }

      ctx.fillStyle = COLORS.buildingB;
      for (let i = -2; i < 8; i++) {
        const bw = 30;
        const bx = 20 + (i * 90) - ((camera.x * 0.15 + 40) % 90);
        const bh = 60 + ((i * 37) % 90);
        const by = viewH - bh + (parallax % 260) - 130;
        ctx.fillRect(bx, by, bw, bh + 400);

        // 건물 B 창문들
        ctx.fillStyle = "rgba(255, 235, 150, 0.25)"; // 조금 더 선명한 불빛
        if (i % 3 === 0) {
          ctx.fillRect(bx + 8, by + 15, 5, 5);
          ctx.fillRect(bx + 18, by + 35, 5, 5);
        }
        ctx.fillStyle = COLORS.buildingB;
      }
    }

    function drawStep(step) {
      const p = worldToScreen(step.x, step.y);
      const w = STEP_DX + 24;
      const h = 16;
      const x = p.x - w / 2;
      const y = p.y;

      // 밤 분위기에 맞춰 그림자 밝기 조정
      ctx.fillStyle = "rgba(0,0,0,0.25)";
      ctx.fillRect(x + 6, y + h, w - 12, Math.max(0, viewH - (y + h)));

      // brick platform
      ctx.fillStyle = COLORS.brick;
      ctx.fillRect(x, y, w, h);
      ctx.fillStyle = COLORS.brickDark;
      ctx.fillRect(x, y + h - 5, w, 5);

      // brick pattern lines
      ctx.strokeStyle = COLORS.brickLine;
      ctx.lineWidth = 1;
      const cell = 12;
      for (let cx = 0; cx < w; cx += cell) {
        ctx.beginPath();
        ctx.moveTo(x + cx, y);
        ctx.lineTo(x + cx, y + h - 5);
        ctx.stroke();
      }
      ctx.strokeStyle = COLORS.stepEdge;
      ctx.lineWidth = 2;
      ctx.strokeRect(x + 1, y + 1, w - 2, h - 2);
    }

    function drawCharacter() {
      const p = worldToScreen(charPos.x, charPos.y);
      const facing = curDir === "R" ? 1 : -1;
      const bob = isAnimating && animKind === "move" ? -6 : 0;
      const wobble = isAnimating && animKind === "stumble" ? Math.sin(performance.now() / 20) * 3 : 0;

      ctx.save();
      ctx.translate(p.x + wobble, p.y - 30 + bob);
      ctx.scale(facing, 1);

      // legs
      ctx.fillStyle = COLORS.pants;
      ctx.fillRect(-8, 14, 6, 12);
      ctx.fillRect(2, 14, 6, 12);

      // torso
      ctx.fillStyle = COLORS.shirt;
      ctx.fillRect(-9, -4, 18, 20);

      // tie
      ctx.fillStyle = COLORS.tie;
      ctx.fillRect(-2, -3, 4, 12);

      // arms
      ctx.fillStyle = COLORS.shirt;
      ctx.fillRect(-13, -2, 5, 12);
      ctx.fillRect(8, -2, 5, 12);

      // head
      ctx.fillStyle = COLORS.skin;
      ctx.fillRect(-8, -20, 16, 16);

      // hair
      ctx.fillStyle = COLORS.hair;
      ctx.fillRect(-8, -22, 16, 5);

      // eye
      ctx.fillStyle = "#1a1a1a";
      ctx.fillRect(4, -13, 2, 2);

      ctx.restore();
    }

    function render() {
      ctx.save();
      if (shake > 0) {
        const sx = (Math.random() - 0.5) * 6 * shake;
        const sy = (Math.random() - 0.5) * 6 * shake;
        ctx.translate(sx, sy);
      }

      drawBackground();

      const lo = Math.max(0, currentIndex - 2);
      const hi = Math.min(steps.length - 1, currentIndex + 14);
      for (let i = lo; i <= hi; i++) drawStep(steps[i]);

      drawCharacter();

      ctx.restore();
    }

    // ---------- Main loop ----------
    function loop(now) {
      if (!lastTime) lastTime = now;
      const dt = Math.min(0.05, (now - lastTime) / 1000);
      lastTime = now;

      update(dt);
      render();

      requestAnimationFrame(loop);
    }

    resetGame();
    requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>
